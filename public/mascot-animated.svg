<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Zettelrobbe – animated idle: breathe, blink, tail wag, note rock, check pulse, sparkles -->
  <style>
    @media (prefers-reduced-motion: reduce) {
      .breathe, .shadow, .eyes, .tail, .zettel, .check, .sparkle {
        animation: none;
      }
      .sparkle { opacity: 0; }
    }
    .breathe {
      animation: breathe 3.2s ease-in-out infinite;
      transform-box: fill-box; transform-origin: 50% 100%;
    }
    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1, 1); }
      50%      { transform: translateY(-3px) scale(1.012, 0.988); }
    }
    .shadow {
      animation: shadowPulse 3.2s ease-in-out infinite;
      transform-box: fill-box; transform-origin: 50% 50%;
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1); opacity: 0.06; }
      50%      { transform: scaleX(0.96); opacity: 0.045; }
    }
    .eyes {
      animation: blink 4.8s infinite;
      transform-box: fill-box; transform-origin: 50% 50%;
    }
    @keyframes blink {
      0%, 90%, 96%, 100% { transform: scaleY(1); }
      93%                { transform: scaleY(0.06); }
    }
    .tail {
      animation: wag 3.2s ease-in-out infinite;
      transform-box: fill-box; transform-origin: 10% 65%;
    }
    @keyframes wag {
      0%, 100% { transform: rotate(0deg); }
      55%      { transform: rotate(7deg); }
    }
    .zettel {
      animation: rock 3.2s ease-in-out infinite;
      transform-box: fill-box; transform-origin: 50% 92%;
    }
    @keyframes rock {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(2deg); }
    }
    .check {
      animation: pulse 3.2s ease-in-out infinite;
      transform-box: fill-box; transform-origin: 50% 50%;
    }
    @keyframes pulse {
      0%, 70%, 100% { transform: scale(1); }
      82%           { transform: scale(1.16); }
    }
    .sparkle {
      opacity: 0;
      animation: spark 4.8s ease-in-out infinite;
      transform-box: fill-box; transform-origin: 50% 50%;
    }
    .sparkle.s2 { animation-delay: 2.4s; }
    @keyframes spark {
      0%, 24%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
      10%           { opacity: 1; transform: scale(1) rotate(18deg); }
      20%           { opacity: 0; transform: scale(0.5) rotate(36deg); }
    }
  </style>

  <defs>
    <clipPath id="bodyClip">
      <path d="M 250 60
               C 182 60 134 110 132 172
               C 115 202 100 258 100 320
               C 100 396 138 460 250 460
               C 362 460 410 396 410 320
               C 410 258 395 202 368 172
               C 366 110 318 60 250 60 Z"/>
    </clipPath>
  </defs>

  <!-- ground shadow -->
  <ellipse class="shadow" cx="262" cy="466" rx="180" ry="18" fill="#12314E"/>

  <g class="breathe">
    <!-- tail flippers (behind body) -->
    <g class="tail">
      <path d="M 355 432
               C 380 420 428 416 462 430
               C 472 434 470 443 460 445
               C 424 450 386 446 362 438 Z"
            fill="#6486A6"/>
      <path d="M 352 424
               C 372 398 414 372 458 366
               C 468 365 472 373 465 381
               C 442 406 404 424 370 430 Z"
            fill="#7495B4"/>
    </g>

    <!-- body -->
    <path d="M 250 60
             C 182 60 134 110 132 172
             C 115 202 100 258 100 320
             C 100 396 138 460 250 460
             C 362 460 410 396 410 320
             C 410 258 395 202 368 172
             C 366 110 318 60 250 60 Z"
          fill="#8FADC8"/>

    <g clip-path="url(#bodyClip)">
      <path d="M 250 40 C 340 40 420 120 420 250 C 420 400 380 470 240 480
               L 430 480 L 430 30 L 250 30 Z"
            fill="#7495B4" opacity="0.45"/>
    </g>

    <!-- head speckles -->
    <g fill="#5F7F9E" opacity="0.45">
      <circle cx="214" cy="118" r="4"/>
      <circle cx="246" cy="103" r="3"/>
      <circle cx="278" cy="120" r="4"/>
      <circle cx="232" cy="138" r="2.5"/>
    </g>

    <!-- belly -->
    <path d="M 250 262
             C 200 262 168 300 168 356
             C 168 415 200 452 250 452
             C 300 452 332 415 332 356
             C 332 300 300 262 250 262 Z"
          fill="#EAF2F8"/>

    <!-- left flipper -->
    <path d="M 154 300
             C 128 318 112 344 108 372
             C 107 386 120 391 131 382
             C 148 366 160 332 164 306 Z"
          fill="#7495B4"/>

    <!-- the Zettel -->
    <g class="zettel">
      <g transform="rotate(-8 205 385)">
        <path d="M 141 300 L 238 300 L 280 342 L 280 459
                 Q 280 470 269 470 L 141 470
                 Q 130 470 130 459 L 130 311
                 Q 130 300 141 300 Z"
              fill="#12314E" opacity="0.10" transform="translate(7 9)"/>
        <path d="M 141 300 L 238 300 L 280 342 L 280 459
                 Q 280 470 269 470 L 141 470
                 Q 130 470 130 459 L 130 311
                 Q 130 300 141 300 Z"
              fill="#FDFBF5"/>
        <path d="M 238 300 L 280 342 L 244 342 Q 238 342 238 336 Z"
              fill="#D9E4EC"/>
        <rect x="148" y="330" width="62" height="18" rx="9" fill="#27A69A"/>
        <g fill="#C3D4E2">
          <rect x="148" y="368" width="112" height="9" rx="4.5"/>
          <rect x="148" y="390" width="84" height="9" rx="4.5"/>
          <rect x="148" y="412" width="100" height="9" rx="4.5"/>
        </g>
        <g class="check">
          <circle cx="253" cy="438" r="14" fill="#27A69A"/>
          <path d="M 246 438 L 251 444 L 261 432"
                fill="none" stroke="#FFFFFF" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
    </g>

    <!-- right flipper resting on the paper -->
    <path d="M 344 292
             C 372 300 380 322 366 342
             C 348 366 314 382 286 388
             C 268 391 258 377 266 362
             C 282 332 314 304 344 292 Z"
          fill="#7E9FBD"/>

    <!-- face -->
    <ellipse cx="250" cy="236" rx="60" ry="43" fill="#EAF2F8"/>
    <g class="eyes">
      <circle cx="190" cy="182" r="19" fill="#12314E"/>
      <circle cx="310" cy="182" r="19" fill="#12314E"/>
      <circle cx="197" cy="174" r="7" fill="#FFFFFF"/>
      <circle cx="317" cy="174" r="7" fill="#FFFFFF"/>
      <circle cx="183" cy="190" r="3" fill="#FFFFFF" opacity="0.75"/>
      <circle cx="303" cy="190" r="3" fill="#FFFFFF" opacity="0.75"/>
    </g>
    <path d="M 238 208 Q 250 200 262 208 Q 258 224 250 226 Q 242 224 238 208 Z" fill="#12314E"/>
    <path d="M 250 226 Q 248 243 232 236" fill="none" stroke="#12314E" stroke-width="5" stroke-linecap="round"/>
    <path d="M 250 226 Q 252 243 268 236" fill="none" stroke="#12314E" stroke-width="5" stroke-linecap="round"/>
    <g fill="#12314E" opacity="0.45">
      <circle cx="206" cy="230" r="2.5"/>
      <circle cx="198" cy="242" r="2.5"/>
      <circle cx="208" cy="252" r="2.5"/>
      <circle cx="294" cy="230" r="2.5"/>
      <circle cx="302" cy="242" r="2.5"/>
      <circle cx="292" cy="252" r="2.5"/>
    </g>
    <ellipse cx="156" cy="228" rx="24" ry="13" fill="#F49B86" opacity="0.6" transform="rotate(-8 156 228)"/>
    <ellipse cx="344" cy="228" rx="24" ry="13" fill="#F49B86" opacity="0.6" transform="rotate(8 344 228)"/>
  </g>

  <!-- sparkles -->
  <path class="sparkle" d="M 434 88 L 440 104 L 456 110 L 440 116 L 434 132 L 428 116 L 412 110 L 428 104 Z" fill="#2FB3A6"/>
  <path class="sparkle s2" d="M 82 128 L 86 139 L 97 143 L 86 147 L 82 158 L 78 147 L 67 143 L 78 139 Z" fill="#8FADC8"/>
</svg>
